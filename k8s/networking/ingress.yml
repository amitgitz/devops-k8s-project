# ──────────────────────────────────────
# App Ingress — app.mailscale.online
# ──────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-ingress
  namespace: devops
  annotations:
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/managed-certificates: "app-cert"
spec:
  rules:
    - host: app.mailscale.online
      http:
        paths:
          - path: /api/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend
                port:
                  number: 80
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 80
---
# Managed Certificate for app.mailscale.online
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: app-cert
  namespace: devops
spec:
  domains:
    - app.mailscale.online
---
# ──────────────────────────────────────
# ArgoCD Ingress — argocd.mailscale.online
# ──────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argocd
  annotations:
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/managed-certificates: "argocd-cert"
spec:
  rules:
    - host: argocd.mailscale.online
      http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
---
# Managed Certificate for argocd.mailscale.online
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: argocd-cert
  namespace: argocd
spec:
  domains:
    - argocd.mailscale.online
