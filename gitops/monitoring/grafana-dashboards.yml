apiVersion: v1
kind: ConfigMap
metadata:
  name: app-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  app-performance.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"devops\"}[5m])) by (service, status)",
              "legendFormat": "{{ service }} - {{ status }}"
            }
          ]
        },
        {
          "title": "Error Rate (%)",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"devops\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{namespace=\"devops\"}[5m])) * 100"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "unit": "percent"
            }
          }
        },
        {
          "title": "Response Time (p95)",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"devops\"}[5m])) by (le))"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "red", "value": 2 }
                ]
              }
            }
          }
        },
        {
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"devops\",container!=\"\"}[5m])) by (pod)",
              "legendFormat": "{{ pod }}"
            }
          ]
        },
        {
          "title": "Pod Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"devops\",container!=\"\"}) by (pod)",
              "legendFormat": "{{ pod }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "title": "Active Pods by Namespace",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "count(kube_pod_info) by (namespace)",
              "legendFormat": "{{ namespace }}"
            }
          ]
        },
        {
          "title": "Database Connections",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "sum(pg_stat_activity_count) by (instance)"
            }
          ]
        },
        {
          "title": "Application Logs (Errors)",
          "type": "logs",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 16 },
          "datasource": "Loki",
          "targets": [
            {
              "expr": "{namespace=\"devops\"} |= \"error\" | json"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "title": "Application Performance",
      "uid": "app-performance",
      "version": 1,
      "time": { "from": "now-1h", "to": "now" }
    }
  business-metrics.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "panels": [
        {
          "title": "Total Items Created (Business Metric)",
          "type": "stat",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(items_created_total{namespace=\"devops\"})"
            }
          ]
        },
        {
          "title": "API Requests by Endpoint",
          "type": "piechart",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "targets": [
            {
              "expr": "sum(http_requests_total{namespace=\"devops\"}) by (handler)",
              "legendFormat": "{{ handler }}"
            }
          ]
        },
        {
          "title": "Active Users (Last 5m)",
          "type": "stat",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "targets": [
            {
              "expr": "count(count by (client_ip) (rate(http_requests_total{namespace=\"devops\"}[5m])))"
            }
          ]
        },
        {
          "title": "Request Volume Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(increase(http_requests_total{namespace=\"devops\"}[1h])) by (handler)",
              "legendFormat": "{{ handler }}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "title": "Business Metrics",
      "uid": "business-metrics",
      "version": 1,
      "time": { "from": "now-24h", "to": "now" }
    }
