name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  HARBOR_REGISTRY: registry.reachinbox.xyz
  HARBOR_PROJECT: test-scale

permissions:
  contents: write

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            apps/backend/package-lock.json
            apps/frontend/package-lock.json

      - name: Lint Backend
        working-directory: apps/backend
        run: |
          npm ci
          npm run lint

      - name: Lint Frontend
        working-directory: apps/frontend
        run: |
          npm ci
          npm run lint

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Test Backend
        working-directory: apps/backend
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: password
          DB_NAME: postgres
          DB_PORT: 5432
        run: |
          npm ci
          npm test

      - name: Test Frontend
        working-directory: apps/frontend
        run: |
          npm ci
          npm test

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            apps/backend/coverage/
          retention-days: 7

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set Git Hash
        id: set_git_hash
        run: echo "git_hash=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image (local)
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          load: true
          tags: backend:scan

      - name: Build Frontend Image (local)
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          load: true
          tags: frontend:scan

      - name: Trivy Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: backend:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Trivy Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git Hash
        id: set_git_hash
        run: echo "git_hash=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: true
          tags: ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/backend:${{ steps.set_git_hash.outputs.git_hash }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: true
          tags: ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/frontend:${{ steps.set_git_hash.outputs.git_hash }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Backend Image Tag
        run: |
          sed -i "s|image: registry.reachinbox.xyz/test-scale/backend:.*|image: registry.reachinbox.xyz/test-scale/backend:${{ steps.set_git_hash.outputs.git_hash }}|" gitops/base/backend.yml

      - name: Update Frontend Image Tag
        run: |
          sed -i "s|image: registry.reachinbox.xyz/test-scale/frontend:.*|image: registry.reachinbox.xyz/test-scale/frontend:${{ steps.set_git_hash.outputs.git_hash }}|" gitops/base/frontend.yml

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline -10 --pretty=format:"- %s (%h)")
          else
            CHANGES=$(git log ${PREV_TAG}..HEAD --oneline --pretty=format:"- %s (%h)")
          fi
          echo "## Changelog — ${{ steps.set_git_hash.outputs.git_hash }}" > CHANGELOG_ENTRY.md
          echo "" >> CHANGELOG_ENTRY.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> CHANGELOG_ENTRY.md
          echo "" >> CHANGELOG_ENTRY.md
          echo "${CHANGES}" >> CHANGELOG_ENTRY.md
          echo "" >> CHANGELOG_ENTRY.md
          # Prepend to CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            cat CHANGELOG_ENTRY.md CHANGELOG.md > CHANGELOG_TMP.md
            mv CHANGELOG_TMP.md CHANGELOG.md
          else
            mv CHANGELOG_ENTRY.md CHANGELOG.md
          fi
          rm -f CHANGELOG_ENTRY.md

      - name: Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/base/backend.yml gitops/base/frontend.yml CHANGELOG.md
          git diff --staged --quiet || git commit -m "ci: deploy ${{ steps.set_git_hash.outputs.git_hash }} [skip ci]"
          git push
