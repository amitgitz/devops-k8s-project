name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  HARBOR_REGISTRY: registry.reachinbox.xyz
  HARBOR_PROJECT: test-scale

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Git Hash
        id: set_git_hash
        run: echo "git_hash=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: true
          tags: ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/backend:${{ steps.set_git_hash.outputs.git_hash }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: true
          tags: ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/frontend:${{ steps.set_git_hash.outputs.git_hash }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Backend Image Tag
        run: |
          sed -i "s|image: registry.reachinbox.xyz/test-scale/backend:.*|image: registry.reachinbox.xyz/test-scale/backend:${{ steps.set_git_hash.outputs.git_hash }}|" gitops/base/backend.yml

      - name: Update Frontend Image Tag
        run: |
          sed -i "s|image: registry.reachinbox.xyz/test-scale/frontend:.*|image: registry.reachinbox.xyz/test-scale/frontend:${{ steps.set_git_hash.outputs.git_hash }}|" gitops/base/frontend.yml

      - name: Commit & Push Updated Manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/base/backend.yml gitops/base/frontend.yml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ steps.set_git_hash.outputs.git_hash }} [skip ci]"
          git push
