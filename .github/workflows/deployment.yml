name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_REPO: amitchoudhary47/devops

jobs:
  # ──────────────────────────────────────
  # Build, Push & Update GitOps Manifests
  # ──────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Git Hash
        id: set_git_hash
        run: echo "git_hash=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}-backend:${{ steps.set_git_hash.outputs.git_hash }}
            ${{ env.IMAGE_REPO }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}-frontend:${{ steps.set_git_hash.outputs.git_hash }}
            ${{ env.IMAGE_REPO }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ──────────────────────────────────────
      # Update image tags in GitOps manifests
      # ──────────────────────────────────────
      - name: Update Backend Image Tag
        run: |
          sed -i "s|image: amitchoudhary47/devops-backend:.*|image: amitchoudhary47/devops-backend:${{ steps.set_git_hash.outputs.git_hash }}|" gitops/base/backend.yml

      - name: Update Frontend Image Tag
        run: |
          sed -i "s|image: amitchoudhary47/devops-frontend:.*|image: amitchoudhary47/devops-frontend:${{ steps.set_git_hash.outputs.git_hash }}|" gitops/base/frontend.yml

      - name: Commit & Push Updated Manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/base/backend.yml gitops/base/frontend.yml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ steps.set_git_hash.outputs.git_hash }} [skip ci]"
          git push
